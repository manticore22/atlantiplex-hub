version: '3.8'

services:
  # Main API Server (Node.js)
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    env_file:
      - ./backend/.env
    restart: unless-stopped
    networks:
      - studio-network

  # Broadcasting Engine (Python/Flask)
  broadcast:
    build:
      context: ./backend
      dockerfile: Dockerfile.python
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_PORT=5000
    env_file:
      - ./backend/.env
    restart: unless-stopped
    networks:
      - studio-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - api
      - broadcast
    restart: unless-stopped
    networks:
      - studio-network

networks:
  studio-network:
    driver: bridge